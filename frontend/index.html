<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>오토원트 - 장기렌트 리스 전문 플랫폼</title>
    <meta name="description" content="장기렌트, 리스 전문 오토원트. 최저가 견적 비교, 보증금 0원, 전문 매니저 1:1 상담. 국산차·수입차 전 차종 취급." />
    <meta name="keywords" content="오토원트, 장기렌트, 리스, 자동차렌트, 차량리스, 월렌트, 렌트카, 견적비교, 보증금0원" />
    <meta property="og:title" content="오토원트 - 장기렌트 리스 전문 플랫폼" />
    <meta property="og:description" content="장기렌트, 리스 전문 오토원트. 최저가 견적 비교, 보증금 0원, 전문 매니저 1:1 상담." />
    <meta property="og:image" content="https://www.autowant.co.kr/images/autowantlogo.png" />
    <meta property="og:url" content="https://www.autowant.co.kr" />
    <meta property="og:type" content="website" />
    <meta name="naver-site-verification" content="03d5dab1e325a152820a77d61c043b25c0ac879b" />
    <link rel="icon" type="image/png" href="/images/autowantlogo.png" />
    <style>
      #splash {
        position: fixed; inset: 0; z-index: 99999;
        background: #fff;
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        transition: opacity 0.5s ease;
      }
      #splash.fade-out {
        opacity: 0; pointer-events: none;
      }
      #splash-logo {
        width: 180px; height: auto;
        animation: splashPulse 1.5s ease-in-out infinite;
      }
      #splash-bar-wrap {
        width: 200px; height: 3px;
        background: #eee; border-radius: 3px;
        margin-top: 28px; overflow: hidden;
      }
      #splash-bar {
        width: 0%; height: 100%;
        background: linear-gradient(90deg, #3182f6, #2563eb);
        border-radius: 3px;
        animation: splashLoad 1.2s ease-out forwards;
      }
      #splash-text {
        margin-top: 16px;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        font-size: 12px; color: #aaa; letter-spacing: 3px;
        text-transform: uppercase; font-weight: 600;
      }
      @keyframes splashPulse {
        0%, 100% { transform: scale(1); opacity: 1; }
        50% { transform: scale(1.03); opacity: 0.85; }
      }
      @keyframes splashLoad {
        0% { width: 0%; }
        60% { width: 70%; }
        100% { width: 100%; }
      }
    </style>
  </head>
  <body>
    <!-- 스플래시 화면 -->
    <div id="splash">
      <img id="splash-logo" src="/images/autowantlogo.png" alt="AUTOWANT" />
      <div id="splash-bar-wrap"><div id="splash-bar"></div></div>
      <p id="splash-text">Loading</p>
    </div>

    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
    <script>
      window.addEventListener('load', function() {
        setTimeout(function() {
          var splash = document.getElementById('splash');
          if (splash) {
            splash.classList.add('fade-out');
            setTimeout(function() { splash.remove(); }, 500);
          }
        }, 800);
      });
    </script>
  </body>
</html>
